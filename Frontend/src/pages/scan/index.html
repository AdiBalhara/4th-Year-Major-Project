<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Scan Vegetable — VegHealth AI</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🥦</text></svg>" />
  <link rel="stylesheet" href="/src/css/main.css" />
</head>
<body>
<div class="app-layout">
  <div class="main-content">

    <div class="page-header">
      <h1 class="page-title">📷 Scan Vegetable</h1>
      <p class="page-subtitle">Use your camera or upload an image for instant AI analysis</p>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="cameraTab">📷 Camera</button>
      <button class="tab-btn" data-tab="uploadTab">📁 Gallery Upload</button>
    </div>

    <!-- Camera Tab -->
    <div class="tab-panel active" id="cameraTab">
      <div class="grid-2">
        <div>
          <div class="camera-container" id="cameraContainer">
            <video class="camera-stream" id="cameraStream" autoplay playsinline muted></video>
            <canvas id="captureCanvas" style="display:none;"></canvas>
            <div class="camera-overlay">
              <button class="capture-btn" id="captureBtn" title="Capture">📸</button>
            </div>
          </div>
          <div style="display:flex;gap:0.75rem;margin-top:1rem;">
            <button class="btn btn-secondary" id="startCameraBtn">▶️ Start Camera</button>
            <button class="btn btn-secondary" id="switchCameraBtn" style="display:none;">🔄 Flip</button>
            <button class="btn btn-secondary" id="stopCameraBtn" style="display:none;">⏹️ Stop</button>
          </div>
          <div id="cameraError" style="display:none;margin-top:1rem;padding:1rem;background:var(--danger-glow);border:1px solid rgba(255,71,87,0.3);border-radius:12px;font-size:0.85rem;color:var(--danger);"></div>
        </div>

        <div>
          <div class="card" id="previewCard" style="min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
            <div id="previewEmpty">
              <div style="font-size:3rem;margin-bottom:1rem;opacity:0.4;">🖼️</div>
              <div style="color:var(--text-muted);font-size:0.9rem;">Captured image will appear here</div>
            </div>
            <img id="previewImage" style="display:none;width:100%;border-radius:12px;max-height:280px;object-fit:cover;" alt="Captured vegetable" />
          </div>
          <button class="btn btn-primary btn-block btn-lg" style="margin-top:1rem;" id="analyzeBtn" disabled>
            <span id="analyzeBtnText">🔬 Analyze Vegetable</span>
            <span id="analyzeSpinner" style="display:none;"><span class="spinner" style="width:18px;height:18px;margin-left:0.5rem;"></span></span>
          </button>
        </div>
      </div>
    </div>

    <!-- Upload Tab -->
    <div class="tab-panel" id="uploadTab">
      <div class="grid-2">
        <div>
          <div class="upload-zone" id="uploadZone">
            <input type="file" accept="image/*" id="fileInput" />
            <div class="upload-icon">☁️</div>
            <div class="upload-text">Drop your image here</div>
            <div class="upload-hint">or click to browse — Supports JPG, PNG, WEBP</div>
          </div>
          <div style="margin-top:1rem;display:flex;gap:0.5rem;flex-wrap:wrap;" id="sampleChips">
            <span style="font-size:0.78rem;color:var(--text-muted);margin-right:0.25rem;align-self:center;">Try sample:</span>
            <button class="chip" data-veg="tomato">🍅 Tomato</button>
            <button class="chip" data-veg="carrot">🥕 Carrot</button>
            <button class="chip" data-veg="spinach">🥬 Spinach</button>
            <button class="chip" data-veg="broccoli">🥦 Broccoli</button>
            <button class="chip" data-veg="lettuce">🥗 Lettuce</button>
          </div>
        </div>

        <div>
          <div class="card" id="uploadPreviewCard" style="min-height:280px;display:flex;flex-direction:column;align-items:center;justify-content:center;text-align:center;">
            <div id="uploadPreviewEmpty">
              <div style="font-size:3rem;margin-bottom:1rem;opacity:0.4;">🥦</div>
              <div style="color:var(--text-muted);font-size:0.9rem;">Selected image will appear here</div>
            </div>
            <img id="uploadPreviewImage" style="display:none;width:100%;border-radius:12px;max-height:280px;object-fit:cover;" alt="Uploaded vegetable" />
            <div id="uploadFileName" style="display:none;margin-top:0.75rem;font-size:0.8rem;color:var(--text-muted);"></div>
          </div>
          <button class="btn btn-primary btn-block btn-lg" style="margin-top:1rem;" id="analyzeUploadBtn" disabled>
            <span id="analyzeUploadBtnText">🔬 Analyze Vegetable</span>
            <span id="analyzeUploadSpinner" style="display:none;"><span class="spinner" style="width:18px;height:18px;margin-left:0.5rem;"></span></span>
          </button>
        </div>
      </div>
    </div>

  </div>
</div>
<script type="module" src="/src/pages/scan/scan.js"></script>
</body>
</html>
